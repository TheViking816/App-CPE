name: Sync puertas

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC. Estas entradas cubren horario de verano e invierno en Espana.
    - cron: "15 5 * * *"
    - cron: "15 6 * * *"
    - cron: "15 10 * * *"
    - cron: "15 11 * * *"
    - cron: "45 12 * * *"
    - cron: "45 13 * * *"

permissions:
  contents: write

jobs:
  sync-puertas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Sync puertas
        id: sync
        continue-on-error: true
        env:
          CPE_PUERTAS_URL: "https://portal.cpevalencia.com/Noray/Puertas.asp?mode=GWT&devType=Desktop&device=Desktop&browser=Chrome&os=Windows&rd=316781698261120260630144003"
          CPE_SUPABASE_URL: ${{ secrets.CPE_SUPABASE_URL }}
          CPE_SUPABASE_SERVICE_ROLE: ${{ secrets.CPE_SUPABASE_SERVICE_ROLE }}
        run: npm run sync:puertas

      - name: Upload debug data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: puertas-debug
          path: |
            data/raw-puertas.txt
            data/puertas-conductor-1a.json
            data/puertas-error.png
          if-no-files-found: ignore

      - name: Commit updated puertas
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualiza puertas App CPE"
          file_pattern: "public/data/puertas-conductor-1a.json public/data/puertas-sync-status.json"

      - name: Fail if sync failed
        if: steps.sync.outcome == 'failure'
        run: exit 1
