name: Sync puertas

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"
    - cron: "15 10 * * *"
    - cron: "45 12 * * *"

permissions:
  contents: write

jobs:
  sync-puertas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Sync puertas
        env:
          CPE_SUPABASE_URL: ${{ secrets.CPE_SUPABASE_URL }}
          CPE_SUPABASE_SERVICE_ROLE: ${{ secrets.CPE_SUPABASE_SERVICE_ROLE }}
        run: npm run sync:puertas

      - name: Commit updated puertas
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualiza puertas App CPE"
          file_pattern: "public/data/puertas-conductor-1a.json"
